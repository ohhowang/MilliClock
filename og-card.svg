<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MilliClock Open Graph Card</title>
  <desc id="desc">Social preview card for MilliClock, featuring a minimalist millisecond digital clock.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.42" r="0.75">
      <stop offset="0%" stop-color="#f7f7f2" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#f7f7f2" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#050505"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="24" y="24" width="1152" height="582" rx="28" fill="none" stroke="#f7f7f2" stroke-opacity="0.1" stroke-width="2"/>

  <g transform="translate(72 72)">
    <rect width="154" height="154" rx="40" fill="#050505" stroke="#f7f7f2" stroke-opacity="0.18" stroke-width="5"/>
    <rect x="28" y="28" width="36" height="68" rx="16" fill="none" stroke="#f7f7f2" stroke-width="12"/>
    <rect x="76" y="28" width="36" height="68" rx="16" fill="none" stroke="#f7f7f2" stroke-width="12"/>
    <circle cx="72" cy="118" r="6.5" fill="#f7f7f2"/>
    <rect x="118" y="88" width="12" height="16" rx="5" fill="#f7f7f2"/>
    <rect x="118" y="109" width="12" height="16" rx="5" fill="#f7f7f2" fill-opacity="0.9"/>
    <rect x="118" y="130" width="12" height="10" rx="5" fill="#f7f7f2" fill-opacity="0.72"/>
  </g>

  <g fill="#f7f7f2" font-family="JetBrains Mono, IBM Plex Mono, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <text x="264" y="146" font-size="38" font-weight="700" letter-spacing="3">MilliClock</text>
    <text x="264" y="196" font-size="24" fill-opacity="0.72">Minimal fullscreen clock with milliseconds</text>

    <text x="72" y="416" font-size="206" font-weight="700" letter-spacing="-16">14:28:36</text>
    <text x="955" y="416" font-size="107" font-weight="700" letter-spacing="-6" fill-opacity="0.92">649</text>

    <text x="72" y="515" font-size="30" fill-opacity="0.82">HH:mm:ss:SSS</text>
    <text x="72" y="551" font-size="24" fill-opacity="0.58">Desktop and mobile adaptive layout. Light and dark theme toggle.</text>
  </g>
</svg>
